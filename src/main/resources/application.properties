spring.application.name=backend

# Database - uses environment variables on Render, falls back to localhost for development
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/feedback_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Bharath@06}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Render provides PORT environment variable
server.port=${PORT:8080}

# Allow cross-origin requests from frontend
spring.web.cors.allowed-origins=*
